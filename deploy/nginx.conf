server_tokens off;

# Rate limiting: 5 POST/мин с одного IP на страницу логина
limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;
# API авторизация: 20 req/мин
limit_req_zone $binary_remote_addr zone=api_login_limit:10m rate=20r/m;

# HTTP → HTTPS редирект
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    client_max_body_size 20m;

    # HSTS — принудительный HTTPS на 1 год
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Заголовки, которые Django НЕ добавляет автоматически
    add_header Permissions-Policy      "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self' data:; script-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self'; frame-ancestors 'none';" always;

    # Статика
    location /static/ {
        alias /var/www/static/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
    }

    # APK-файлы для обновления приложений
    location /downloads/ {
        alias /var/www/downloads/;
        access_log off;
        add_header Content-Disposition "attachment";
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Вложения к документам — закрыты полностью
    location /media/attachments/ {
        return 404;
    }

    # Брендинг (логотип) — публичный, кешируется
    location /media/branding/ {
        alias /var/www/media/branding/;
        expires 7d;
        access_log off;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Internal location для X-Accel-Redirect из Django
    location /protected_media/ {
        internal;
        alias /var/www/media/;
    }

    # Прочие медиафайлы — Django проверяет авторизацию
    location /media/ {
        proxy_pass         http://web:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Логин веб-формы: защита от брутфорса
    location = /accounts/login/ {
        limit_req        zone=login_limit burst=5 nodelay;
        limit_req_status 429;
        proxy_pass         http://web:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Permissions-Policy      "geolocation=(), microphone=(), camera=()" always;
        add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self' data:; script-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self'; frame-ancestors 'none';" always;
    }

    # API логин: защита от брутфорса
    location = /api/v1/auth/login/ {
        limit_req        zone=api_login_limit burst=10 nodelay;
        limit_req_status 429;
        proxy_pass         http://web:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass         http://web:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
