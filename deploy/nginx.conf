server_tokens off;

# Rate limiting: 5 POST/мин с одного IP на страницу логина
limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;
# API авторизация: 20 req/мин
limit_req_zone $binary_remote_addr zone=api_login_limit:10m rate=20r/m;

server {
    listen 80;
    server_name _;

    client_max_body_size 20m;

    # Заголовки безопасности (применяются ко всем ответам через proxy)
    add_header X-Frame-Options          "SAMEORIGIN"                      always;
    add_header X-Content-Type-Options   "nosniff"                         always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy       "geolocation=(), microphone=(), camera=()" always;
    # Все ресурсы — только свой домен (Bootstrap и шрифты теперь self-hosted)
    add_header Content-Security-Policy  "default-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self' data:; script-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self'; frame-ancestors 'none';" always;

    # Статика
    location /static/ {
        alias /var/www/static/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Вложения к документам — закрыты полностью
    location /media/attachments/ {
        return 404;
    }

    # Брендинг (логотип) — публичный, кешируется
    location /media/branding/ {
        alias /var/www/media/branding/;
        expires 7d;
        access_log off;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Internal location для X-Accel-Redirect из Django (serve_protected_media)
    # Прямые запросы к /protected_media/ отклоняются nginx-ом (internal)
    location /protected_media/ {
        internal;
        alias /var/www/media/;
    }

    # Прочие медиафайлы — Django проверяет авторизацию и возвращает X-Accel-Redirect
    location /media/ {
        proxy_pass         http://web:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Логин веб-формы: защита от брутфорса
    location = /accounts/login/ {
        limit_req        zone=login_limit burst=5 nodelay;
        limit_req_status 429;
        proxy_pass         http://web:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        add_header X-Frame-Options        "SAMEORIGIN"                      always;
        add_header X-Content-Type-Options "nosniff"                         always;
        add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self' data:; script-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self'; frame-ancestors 'none';" always;
    }

    # API логин: защита от брутфорса
    location = /api/v1/auth/login/ {
        limit_req        zone=api_login_limit burst=10 nodelay;
        limit_req_status 429;
        proxy_pass         http://web:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass         http://web:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
