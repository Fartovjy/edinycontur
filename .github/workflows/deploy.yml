name: Deploy to production

# Запускается при push в ветку main
on:
  push:
    branches: [main]
  # Или вручную из GitHub Actions
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Timeweb
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          script: bash /home/deploy/app/deploy/deploy.sh
          script_stop: true
          # Таймаут — 10 минут (пересборка может занять время)
          command_timeout: 10m
