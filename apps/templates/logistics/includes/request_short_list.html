{% for item in items %}
  <div class="border-bottom py-2">
    <a class="fw-semibold" href="{{ item.get_absolute_url }}">{{ item.request_number }}</a>
    <div>{{ item.client_name }}</div>
    <div class="small text-muted">
      {{ item.get_status_display }}
      · водитель: {{ item.assigned_driver|default:"-" }}
      · доставка: {{ item.planned_delivery_date|date:"d.m.Y"|default:"-" }}
    </div>
  </div>
{% empty %}
  <div class="text-muted">{{ empty_text }}</div>
{% endfor %}
