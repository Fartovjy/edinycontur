{% extends "logistics/base.html" %}
{% block title %}Создание из файла — Единый Контур{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-start mb-4">
  <div>
    <h1 class="h3 mb-1">Создание заявки из файла</h1>
    <div class="text-muted">Загрузите PDF-документ «Заказ клиента»</div>
  </div>
  <a class="btn btn-outline-secondary" href="{% url 'request_list' %}">К списку</a>
</div>

<div class="card border-0 shadow-sm" style="max-width:520px">
  <div class="card-body">
    <form method="post" enctype="multipart/form-data" class="d-flex flex-column gap-3">
      {% csrf_token %}
      <div>
        <label class="form-label fw-semibold" for="pdf_file">PDF-файл</label>
        <input class="form-control" type="file" id="pdf_file" name="pdf_file" accept=".pdf" required>
        <div class="form-text">Поддерживается формат «Заказ клиента» из 1С/ERP</div>
      </div>
      <div class="d-flex gap-2">
        <button class="btn btn-primary" type="submit">Разобрать файл</button>
        <a class="btn btn-outline-secondary" href="{% url 'request_create' %}">Создать вручную</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
