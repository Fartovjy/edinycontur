{% extends "logistics/base.html" %}
{% block title %}Удаление клиента - Единый Контур{% endblock %}
{% block content %}
<div class="card border-0 shadow-sm">
  <div class="card-body">
    <h1 class="h4 mb-3">Удалить клиента?</h1>
    <p class="mb-4">Клиент <strong>{{ client_obj.name }}</strong> будет удалён из справочника. Уже созданные заявки останутся без изменений.</p>
    <form method="post" class="d-flex gap-2">
      {% csrf_token %}
      <button class="btn btn-danger" type="submit">Удалить</button>
      <a class="btn btn-outline-secondary" href="{% url 'client_list' %}">Отмена</a>
    </form>
  </div>
</div>
{% endblock %}
